const ACTS = ['主日','小排','晨興','禱告'];
const ACT_WEIGHT = {'主日':3,'小排':1,'晨興':1,'禱告':1};

function renderPodiumDots(person) {
  return ACTS.map(act => {
    const w = person.breakdown[act].weeks;
    return w.map(v => `<div class="pb ${v?'on':''}"></div>`).join('');
  }).join('');
}

function renderActBlock(act, info) {
  const wt = ACT_WEIGHT[act];
  const dots = info.weeks.map(v =>
    `<div class="wdot ${v?'on':'off'}">${v?'✓':'—'}</div>`
  ).join('');
  return `
    <div class="act-block">
      <div class="act-name">
        <span>${act} <span style="color:#555;font-size:10px">×${wt}</span></span>
        <span class="act-pts">${info.points}pt</span>
      </div>
      <div class="week-row">${dots}</div>
    </div>`;
}

function renderCard(p, isPodium) {
  const pct = Math.round(p.score / DATA.max_score * 100);
  const acts = ACTS.map(act => renderActBlock(act, p.breakdown[act])).join('');
  return `
    <div class="list-card" onclick="this.classList.toggle('open')">
      <div class="list-row">
        <div class="list-rank ${p.rank<=3?'top':''}">${p.rank}</div>
        <div class="list-name">${p.姓名}</div>
        <div class="list-score-bar">
          <div class="score-track"><div class="score-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="list-score-num">${p.score}</div>
        <div class="chevron">›</div>
      </div>
      <div class="detail">
        <div class="detail-grid">${acts}</div>
      </div>
    </div>`;
}

    }
  });

  const podiumCards = [1,2,3].flatMap(rank => {
    const group = podiumGroups[rank] || [];
    const info = rankInfo[rank];
    return group.map(p => `
      <div class="podium-card ${info.cls}" onclick="document.querySelectorAll('.list-card')[${p._idx}].classList.toggle('open');document.querySelectorAll('.list-card')[${p._idx}].scrollIntoView({behavior:'smooth'})">
        <div class="podium-crown">${info.crown}</div>
        <div class="podium-rank">${info.label}</div>
        <div class="podium-name">${p.姓名}</div>
        <div class="podium-score">${p.score}</div>
        <div class="podium-score-label">/ ${DATA.max_score} 分</div>
        <div class="podium-bar">${renderPodiumDots(p)}</div>
      </div>`);
  });

  const podiumHTML = `<div class="podium">${podiumCards.join('')}</div>`;
  const rest = DATA.rankings.filter(p => p.rank > 3);

  const listHTML = `
    <div class="section-label">完整排名</div>
    ${DATA.rankings.map(p => renderCard(p)).join('')}
    <div class="score-note">主日×3分 · 小排×1分 · 晨興×1分 · 禱告×1分 · 滿分 ${DATA.max_score} 分</div>`;

  document.getElementById('app').innerHTML = podiumHTML + listHTML;
}

render();
</script>
</body>
</html>
