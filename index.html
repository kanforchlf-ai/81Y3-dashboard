let currentFilter = 'all';

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderCards();
}

function flagKey(activity, weekLabel) {
  return activity + weekLabel;
}

function isFlagged(person, activity, weekLabel) {
  return person.flags.includes(activity + weekLabel);
}

function renderSummary(data) {
  const total = data.length;
  const flagged = data.filter(p => p.flags.length > 0).length;
  const clean = total - flagged;
  const totalFlags = data.reduce((s, p) => s + p.flags.length, 0);

  document.getElementById('flagCount').textContent = `${flagged} 人待確認`;
  document.getElementById('summaryBar').innerHTML = `
    <div class="stat-box"><div class="stat-num" style="color:#333;font-size:18px">2026/03/29</div><div class="stat-label">最新統計日期 <span class="tip-icon" data-tip="資料最後一週為 2026年3月第五週（3/29），請回溯此日期的出席記錄">?</span></div></div>
    <div class="stat-box"><div class="stat-num" style="color:#333">${total}</div><div class="stat-label">顯示人數 <span class="tip-icon" data-tip="目前篩選條件下的成員總數">?</span></div></div>
    <div class="stat-box"><div class="stat-num" style="color:#e74c3c">${flagged}</div><div class="stat-label">疑似漏填 <span class="tip-icon" data-tip="歷史出席率 ≥50%，但本月至少有一週記錄為 0 的人數">?</span></div></div>
    <div class="stat-box"><div class="stat-num" style="color:#27ae60">${clean}</div><div class="stat-label">記錄正常 <span class="tip-icon" data-tip="本月沒有疑似漏填情況的人數">?</span></div></div>
    <div class="stat-box"><div class="stat-num" style="color:#e67e22">${totalFlags}</div><div class="stat-label">待確認筆數 <span class="tip-icon" data-tip="所有人加總起來，疑似漏填的週次總數">?</span></div></div>
  `;
}

function renderCards() {
  // 排除所有活動歷史率都是 0 且三月也全為 0 的無效名單
  let data = RAW_DATA.filter(p =>
    ACTIVITIES.some(act => {
      const a = p.activities[act];
      return a.historical > 0 || a.march.some(v => v === 1);
    })
  );

  if (currentFilter === 'flagged') data = data.filter(p => p.flags.length > 0);

  // Sort: flagged first, then by flag count desc
  data.sort((a, b) => b.flags.length - a.flags.length);

  renderSummary(data);

  const container = document.getElementById('cardContainer');
  if (data.length === 0) {
    container.innerHTML = '<div class="no-results">沒有符合條件的成員</div>';
    return;
  }

  let html = '';
  data.forEach(person => {
    html += renderCard(person);
  });

  container.innerHTML = html;

  // Attach toggle
  container.querySelectorAll('.card-header').forEach(h => {
    h.addEventListener('click', () => {
      h.closest('.card').classList.toggle('open');
    });
  });
}

function renderCard(person) {
  const name = person['姓名'];
  const flagCount = person.flags.length;
  const color = getColor(name);
  const initial = name[0];

  const flagPills = flagCount > 0
    ? `<div class="flag-pills">${person.flags.slice(0, 4).map(f =>
        `<span class="pill pill-warning">${f}</span>`
      ).join('')}${flagCount > 4 ? `<span class="pill pill-warning">+${flagCount - 4} 項</span>` : ''}</div>`
    : `<div class="no-flag-msg">✓ 本月記錄正常</div>`;

  const mainRate = Math.round(person.activities['主日'].historical * 100);

  // Activity blocks
  const actBlocks = ACTIVITIES.map(act => {
    const info = person.activities[act];
    const hist = Math.round(info.historical * 100);
    if (hist === 0 && info.march.every(v => v === 0)) return ''; // skip zero-history activities
    const hasFlag = info.march.some((v, i) => isFlagged(person, act, info.weeks[i]));

    const dots = info.march.map((v, i) => {
      const wk = WEEK_LABELS[i];
      const weekLabel = info.weeks[i];
      const flagged = isFlagged(person, act, weekLabel);
      let cls, symbol;
      if (v === null) { cls = 'dot-blank'; symbol = '?'; }
      else if (flagged) { cls = 'dot-flag'; symbol = '✗'; }
      else if (v === 1) { cls = 'dot-attended'; symbol = '✓'; }
      else { cls = 'dot-absent'; symbol = '—'; }
      return `<div class="dot ${cls}" title="${act}${weekLabel}"><span>${symbol}</span><span class="wk">${wk}</span></div>`;
    }).join('');

    return `
      <div class="activity-block ${hasFlag ? 'has-flag' : ''}">
        <div class="activity-name">
          ${act}
          <span class="historical-rate">歷史 ${hist}%</span>
        </div>
        <div class="week-dots">${dots}</div>
      </div>`;
  }).join('');

  return `
    <div class="card ${flagCount > 0 ? '' : ''}">
      <div class="card-header">
        <div class="avatar" style="background:${color}">${initial}</div>
        <div class="person-info">
          <div class="person-name">${name} <span style="font-size:12px;color:#aaa;font-weight:400">主日歷史 ${mainRate}%</span></div>
          <div class="person-meta">${person['排'] || '未分排'}</div>
        </div>
        ${flagPills}
        <span class="chevron">›</span>
      </div>
      <div class="card-body">
        <div class="activity-grid">${actBlocks}</div>
      </div>
    </div>`;
}

renderCards();
</script>
