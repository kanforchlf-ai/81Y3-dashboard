<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){
  const KEY = 'auth_81y3';
  const CORRECT = '5281';
  if (sessionStorage.getItem(KEY) !== CORRECT) {
    const input = prompt('請輸入密碼');
    if (input !== CORRECT) {
      document.documentElement.innerHTML = '<div style="font-family:sans-serif;text-align:center;margin-top:20%;color:#999">密碼錯誤</div>';
      throw new Error('unauthorized');
    }
    sessionStorage.setItem(KEY, CORRECT);
  }
})();
</script>
<title>81會所 出席統計</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #0a0a14;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .logo { font-size: 12px; letter-spacing: 3px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 10px; }
  h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; letter-spacing: 0.5px; }
  .tagline { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 52px; }

  .group-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    width: 100%;
    max-width: 720px;
  }
  @media (max-width: 560px) {
    .group-grid { grid-template-columns: 1fr; max-width: 340px; }
  }

  .group-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 36px 20px 30px;
    border-radius: 22px;
    text-decoration: none;
    color: white;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .group-card::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.05);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .group-card:hover { transform: translateY(-6px); }
  .group-card:hover::before { opacity: 1; }

  .gc-youth  { background: linear-gradient(145deg, #4a1580, #7c3aed); box-shadow: 0 4px 24px rgba(124,58,237,0.35); }
  .gc-hs     { background: linear-gradient(145deg, #b45309, #d97706); box-shadow: 0 4px 24px rgba(217,119,6,0.35); }
  .gc-ms     { background: linear-gradient(145deg, #065f46, #059669); box-shadow: 0 4px 24px rgba(5,150,105,0.35); }
  .gc-trend  { background: linear-gradient(145deg, #0f4c81, #1a6eb5); box-shadow: 0 4px 24px rgba(26,110,181,0.35); }
  .gc-kids   { background: linear-gradient(145deg, #c0392b, #e74c3c); box-shadow: 0 4px 24px rgba(231,76,60,0.35); }

  .gc-icon { font-size: 44px; }
  .gc-label { font-size: 12px; font-weight: 700; letter-spacing: 2px; opacity: 0.6; text-transform: uppercase; }
  .gc-name { font-size: 22px; font-weight: 800; }
  .gc-sub { font-size: 12px; opacity: 0.55; }

  .footer { margin-top: 52px; font-size: 11px; color: rgba(255,255,255,0.18); letter-spacing: 1px; }
</style>
</head>
<body>

<div class="logo">台北市召會第八十一會所</div>
<h1>出席統計系統</h1>
<p class="tagline">選擇你要查看的大區</p>

<div class="group-grid">
  <a href="youth.html" class="group-card gc-youth">
    <div class="gc-icon">⚡</div>
    <div class="gc-label">YOUTH</div>
    <div class="gc-name">青年大區</div>
    <div class="gc-sub">一區 · 二區 · 三區</div>
  </a>

  <a href="hs.html" class="group-card gc-hs">
    <div class="gc-icon">🔥</div>
    <div class="gc-label">HIGH SCHOOL</div>
    <div class="gc-name">高中大區</div>
    <div class="gc-sub">一區 · 二區 · 三區</div>
  </a>

  <a href="ms.html" class="group-card gc-ms">
    <div class="gc-icon">🌱</div>
    <div class="gc-label">MIDDLE SCHOOL</div>
    <div class="gc-name">國中大區</div>
    <div class="gc-sub">一區 · 二區</div>
  </a>
</div>

<div style="margin-top:16px;display:flex;gap:12px;max-width:700px;margin:16px auto 0">
  <a href="trend.html" class="group-card gc-trend" style="flex:1;padding:24px 20px 20px">
    <div class="gc-icon">📈</div>
    <div class="gc-label">TREND CHART</div>
    <div class="gc-name">出席趨勢</div>
    <div class="gc-sub">近4個月折線圖</div>
  </a>
  <a href="kids/index.html" class="group-card gc-kids" style="flex:1;padding:24px 20px 20px">
    <div class="gc-icon">🎈</div>
    <div class="gc-label">CHILDREN</div>
    <div class="gc-name">兒童專區</div>
    <div class="gc-sub">12歲以下 · 26人</div>
  </a>
</div>

<div class="footer">81Y · 出席統計系統</div>

</body>
</html>
