  .top-title { font-size: 17px; font-weight: 700; }
  .top-sub { font-size: 12px; opacity: 0.6; margin-left: auto; }

  .container { max-width: 860px; margin: 0 auto; padding: 16px; }

  /* ── Level 1: scope selector ── */
  .scope-tabs {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
  }
  .scope-tab {
    padding: 8px 18px; border-radius: 10px; font-size: 14px; font-weight: 700;
    border: 2px solid transparent; cursor: pointer; transition: all 0.2s;
    background: white; color: #666;
  }
  .scope-tab:hover { border-color: #ccc; }
  .scope-tab.active { color: white; }
  .scope-tab[data-scope="church"].active { background: linear-gradient(135deg,#1a1a2e,#2c3e50); border-color: #2c3e50; }
  .scope-tab[data-scope="youth"].active  { background: #e8522a; border-color: #e8522a; }
  .scope-tab[data-scope="hs"].active     { background: #c0392b; border-color: #c0392b; }
  .scope-tab[data-scope="ms"].active     { background: #27ae60; border-color: #27ae60; }

  /* ── Level 2: small district buttons (hidden for church/大區 views) ── */
  .district-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; min-height: 36px; }
  .district-btn {
    padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
    border: 2px solid #ddd; cursor: pointer; transition: all 0.2s;
    background: white; color: #555;
  }
  .district-btn.active { color: white; border-color: transparent; }
  .district-btn[data-dk^="y"].active  { background: #e8522a; }
  .district-btn[data-dk^="hs"].active { background: #c0392b; }
  .district-btn[data-dk^="ms"].active { background: #27ae60; }
  .district-btn[data-dk="youth"].active { background: #e8522a; }
  .district-btn[data-dk="hs"].active    { background: #c0392b; }
  .district-btn[data-dk="ms"].active    { background: #27ae60; }
  .district-btn:not(.active):hover { border-color: #aaa; }
  .btn-group-label {
    font-size: 11px; color: #aaa; align-self: center;
    padding: 0 2px; font-weight: 600; letter-spacing: 0.3px;
  }

    background: white; border-radius: 12px; padding: 14px 18px;

  .filter-label { font-size: 12px; font-weight: 700; color: #555; width: 32px; flex-shrink: 0; }
  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .seg-btn {
    padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;

  .seg-btn.active-gender { background: #2f80ed; border-color: #2f80ed; color: white; }
  .seg-btn.active-age    { background: #9b59b6; border-color: #9b59b6; color: white; }

  .chart-card {

  .chart-subtitle { font-size: 12px; color: #999; margin-top: 3px; }

  .stat-lbl { font-size: 11px; color: #999; margin-top: 2px; }

  .trend-up   { color: #27ae60; }
  .trend-down { color: #e74c3c; }

  .band { font-size: 11px; padding: 3px 8px; border-radius: 4px;

  .band-dot { width: 8px; height: 8px; border-radius: 2px; }

let currentScope = 'youth';

let genderFilter = 'all';
let ageFilter = 'all';
let chartInstance = null;

function getSegKey() {
  if (genderFilter==='all' && ageFilter==='all') return 'all';
  if (genderFilter==='all') return ageFilter;
  if (ageFilter==='all') return genderFilter;
  return `${genderFilter}_${ageFilter}`;
}
function getSegData(dk, act) {
  const d = TREND_DATA.districts[dk];
  if (!d) return Array(18).fill(0);
  return d[act][getSegKey()] || d[act]['all'] || Array(18).fill(0);
}

// ── Init ───────────────────────────────────────────────────────────
(function() {
  if (sessionStorage.getItem('auth_81y3') !== '5281') {
    location.replace('index.html'); return;
  }
  renderDistrictRow();
  renderAll();
  renderMonthBands();
})();

function renderAll() { renderChart(); renderStats(); renderMembers(); }

const SMALL_DKS = new Set(['y1','y2','y3','hs1','hs2','hs3','ms1','ms2']);

function renderMembers() {
  const el = document.getElementById('memberList');
  if (!SMALL_DKS.has(currentDk)) { el.innerHTML = ''; return; }

  let members = (MEMBER_DATA[currentDk] || []).filter(m => {
    if (genderFilter === 'male'   && m.g !== 'm') return false;
    if (genderFilter === 'female' && m.g !== 'f') return false;
    if (ageFilter === 'daxue'   && m.a !== 'd') return false;
    if (ageFilter === 'qingzhi' && m.a !== 'q') return false;
    return true;
  });

  const gIcon  = {m:'🙋', f:'🙋‍♀️'};
  const scope  = currentDk.startsWith('y') ? 'youth' : currentDk.startsWith('hs') ? 'hs' : 'ms';
  const accent = {youth:'#e8522a', hs:'#c0392b', ms:'#27ae60'}[scope];

  el.innerHTML = `<div class="member-list-card">
    <div class="member-list-header">
      <div class="member-list-title">📋 ${DK_NAME[currentDk]} 名單</div>
      <div class="member-count-badge" style="background:${accent}">${members.length} 人</div>
    </div>
    <div class="member-chips">
      ${members.length === 0
        ? '<div style="color:#aaa;font-size:13px">無符合條件的成員</div>'
        : members.map(m =>
            `<div class="member-chip">
              <span>${gIcon[m.g]}</span>
              <span>${m.n}</span>
              <span class="chip-group">${m.r}</span>
            </div>`
          ).join('')}
    </div>
  </div>`;
}

function selectScope(scope) {
  currentScope = scope;
  document.querySelectorAll('.scope-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.scope === scope));

  const cfg = SCOPE_CONFIG[scope];
  // Default to 大區 aggregate when scope changes
  currentDk = cfg.dk;
  renderDistrictRow();
  renderAll();
}

function selectDk(dk) {
  currentDk = dk;
  renderDistrictRow();
  renderAll();
}

function renderDistrictRow() {
  const cfg = SCOPE_CONFIG[currentScope];
  if (!cfg.sub) {
    // church view: no sub-districts
    document.getElementById('districtRow').innerHTML = '';
    return;
  }

  // Show 大區合計 + individual 小區
  const btns = [
    `<button class="district-btn ${currentDk===cfg.dk?'active':''}" data-dk="${cfg.dk}"
      onclick="selectDk('${cfg.dk}')">${cfg.name}合計</button>`,
    ...cfg.sub.map(d =>
      `<button class="district-btn ${currentDk===d.dk?'active':''}" data-dk="${d.dk}"
        onclick="selectDk('${d.dk}')">${d.name}</button>`)
  ].join('');
  document.getElementById('districtRow').innerHTML = btns;
}

function setGender(val, btn) {
  genderFilter = val;
  document.querySelectorAll('[data-gender]').forEach(b => b.classList.remove('active-gender'));
  btn.classList.add('active-gender');
  renderAll();
}
function setAge(val, btn) {
  ageFilter = val;
  document.querySelectorAll('[data-age]').forEach(b => b.classList.remove('active-age'));
  btn.classList.add('active-age');
  renderAll();
}

function renderChart() {
  const seg = getSegKey();
  const segLabel = SEG_LABELS[seg] || '';
  const viewName = DK_NAME[currentDk] || currentDk;

  document.getElementById('chartTitle').textContent =
    segLabel === '全部'
      ? `${viewName} — 各項出席人數`
      : `${viewName} · ${segLabel} — 各項出席`;
  document.getElementById('chartSubtitle').textContent =
    `每週實際到場人數（不含福音朋友、兒童）${seg!=='all' ? ' · 族群：'+segLabel : ''}`;

  const datasets = Object.entries(ACT_COLORS).map(([act, clr]) => ({
    label: act,
    data: getSegData(currentDk, act),
    borderColor: clr.border,
    backgroundColor: clr.bg,
    borderWidth: 2.5,
    pointRadius: 3, pointHoverRadius: 6,
    tension: 0.3, fill: false,
  }));

  const monthBgPlugin = {
    id: 'monthBg',
    beforeDraw(chart) {
      const {ctx, chartArea:{top,bottom}, scales:{x}} = chart;
      if (!x) return;
      const mc = {'12月':'rgba(232,244,253,0.45)','1月':'rgba(254,249,231,0.45)',
                  '2月':'rgba(240,255,244,0.45)','3月':'rgba(253,242,248,0.45)'};
      ['12月','1月','2月','3月'].forEach(m => {
        const idxs = WEEK_META.map((w,i) => w.month===m?i:-1).filter(i=>i>=0);
        if (!idxs.length) return;
        const step = x.getPixelForValue(1)-x.getPixelForValue(0);
        ctx.fillStyle = mc[m];
        ctx.fillRect(x.getPixelForValue(idxs[0])-step/2, top, idxs.length*step, bottom-top);
      });
    }
  };

  const cfg = {
    type: 'line',
    data: {labels: LABELS, datasets},
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: {mode:'index', intersect:false},
      plugins: {
        legend: {position:'top', labels:{font:{size:12},boxWidth:12,padding:12}},
        tooltip: {
          callbacks: {
            title: items => {
              const w = WEEK_META[items[0].dataIndex];
              return `${w.month} 第${w.label.replace('W','')}週`;
            },
            label: item => ` ${item.dataset.label}：${item.parsed.y} 人`,
          }
        },
      },
      scales: {
        x: {
          grid: {display:false},
          ticks: {
            font:{size:11},
            color: ctx => WEEK_META[ctx.index]?.first ? '#333' : '#aaa',
            maxRotation: 0,
            callback: (val,idx) => LABELS[idx],
          }
        },
        y: {
          beginAtZero: true,
          grid: {color:'rgba(0,0,0,0.05)'},
          ticks: {font:{size:11}, precision:0},
        }
      }
    },
    plugins: [monthBgPlugin],
  };

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('trendChart'), cfg);
}

function renderStats() {
  document.getElementById('statsRow').innerHTML =
    Object.entries(ACT_COLORS).map(([act, clr]) => {
      const vals = getSegData(currentDk, act);
      const last4 = vals.slice(-4);
      const prev4 = vals.slice(-8,-4);
      const avg4  = (last4.reduce((a,b)=>a+b,0)/last4.length).toFixed(1);
      const avgP  = prev4.length ? (prev4.reduce((a,b)=>a+b,0)/prev4.length).toFixed(1) : avg4;
      const diff  = (parseFloat(avg4)-parseFloat(avgP)).toFixed(1);
      const cls = diff>0?'trend-up':diff<0?'trend-down':'trend-flat';
      const str = diff>0?`▲ ${diff}`:diff<0?`▼ ${Math.abs(diff)}`:'— 持平';
      return `<div class="stat-card">
        <div class="stat-val" style="color:${clr.border}">${avg4}</div>
        <div class="stat-lbl">${act} 近4週均</div>
        <div class="stat-trend ${cls}">${str}</div>
      </div>`;
    }).join('');
}

function renderMonthBands() {
  const clrs = ['#2f80ed','#f39c12','#27ae60','#e8522a'];
  document.getElementById('monthBands').innerHTML =
    ['12月','1月','2月','3月'].map((m,i) =>
      `<div class="band">
        <div class="band-dot" style="background:${['#e8f4fd','#fef9e7','#f0fff4','#fdf2f8'][i]};border:1px solid ${clrs[i]}60"></div>
        <span style="color:#666;font-size:11px">${m==='12月'?'2025年12月':'2026年'+m}</span>
      </div>`
    ).join('');
}
</script>
